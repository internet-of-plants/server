language: rust
rust:
    - stable
branches:
    only:
        - deploy
cache: cargo
before_script:
    - sudo add-apt-repository -y ppa:chris-lea/libsodium
    - sudo apt-get update -y
    - sudo apt-get install -y libsodium-dev openssl
    - cargo install diesel_cli --force
    - rustup component add rustfmt-preview
    - psql -c "ALTER USER postgres WITH PASSWORD 'postgres';" -U postgres
    - diesel setup --database-url=postgres://postgres:postgres@localhost/iop
    - diesel setup --database-url=postgres://postgres:postgres@localhost/test_iop
script:
    - cargo fmt --all
    - cargo build --release --verbose
    - cargo test --release
