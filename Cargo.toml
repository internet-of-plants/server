[package]
name = "server_iop"
version = "0.3.0"
authors = ["Paulo Cabral Sanz <paulosanz@poli.ufrj.br>"]

[dependencies]
actix = "0.5"
actix-web = { version = "0.6", features = ["alpn"] }
openssl = { version = "0.10", features = ["v110"] }

diesel = { version = "1.0", features = ["postgres"] }
r2d2 = "0.8"
r2d2-diesel = "1.0"
dotenv = "0.11"

hex = "0.2"
sodiumoxide = "0.0.16"
rand = "0.5.0-pre.1"

serde = "1.0"
serde_derive = "1.0"
slugify = "0.1.0"
image = "0.19.0"

slog = { version = "2", features = ["max_level_trace"] }
slog-term = "2"
slog-async = "2"
env_logger = "0.5"

lazy_static = "1"

base64 = "0.9"

futures = "0.1"
